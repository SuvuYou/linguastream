name: CI

on:
  pull_request:
    branches: [master, development]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    env:
      JELLYFIN_URL: http://localhost
      JELLYFIN_API_KEY: test
      JELLYFIN_USER_ID: test
      DATABASE_URL: postgres://test
      FIREBASE_ADMIN_PROJECT_ID: test
      FIREBASE_ADMIN_CLIENT_EMAIL: test
      FIREBASE_ADMIN_PRIVATE_KEY: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Coverage
        run: npm run test:coverage
